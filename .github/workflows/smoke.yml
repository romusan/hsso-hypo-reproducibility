name: Reproducibility smoke test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  minimal-reproduction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install minimal dependency
        run: python -m pip install numpy
      - name: Run minimal optimizer example
        run: python HSSO-CG-Paper/examples/minimal_swarm.py
      - name: Check shared-core invariants
        run: python HSSO-CG-Paper/tests/test_shared_core.py
      - name: Verify canonical-file checksums
        run: python tools/verify_manifest.py
      - name: Audit manuscript-facing release contents
        run: python tools/audit_release.py
